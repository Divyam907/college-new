<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – AttendanceAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg, #1e2139, #3d4471); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
    .brand-icon { font-size: 3rem; color: #5661f6; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
          <h4 class="fw-bold mt-2">AttendanceAI</h4>
          <p class="text-muted small">Sign in to continue</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>
        <p class="text-center mt-3 mb-0 small">
          Don't have an account? <a href="{{ url_for('signup') }}" class="fw-semibold text-decoration-none">Sign Up</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
