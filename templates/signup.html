<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – AttendanceAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg, #1e2139, #3d4471); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
    .brand-icon { font-size: 3rem; color: #5661f6; }
    .role-box { border: 2px solid #dee2e6; border-radius: 12px; padding: 14px 10px; cursor: pointer; transition: all .2s; text-align: center; }
    .role-box:hover { border-color: #5661f6; }
    input[name="role"]:checked ~ .role-box { border-color: #5661f6; background: #f0f1ff; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-6">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
          <h4 class="fw-bold mt-2">Create Account</h4>
          <p class="text-muted small">Join AttendanceAI</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Your full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold small">Select Your Role</label>
            <div class="row g-3">
              <div class="col-6">
                <label class="d-block">
                  <input type="radio" name="role" value="admin" class="d-none" required>
                  <div class="role-box">
                    <i class="bi bi-shield-check fs-3 text-primary d-block mb-1"></i>
                    <strong class="small">Admin</strong>
                    <div class="text-muted" style="font-size:.75rem">Register students</div>
                  </div>
                </label>
              </div>
              <div class="col-6">
                <label class="d-block">
                  <input type="radio" name="role" value="college" class="d-none">
                  <div class="role-box">
                    <i class="bi bi-building fs-3 text-success d-block mb-1"></i>
                    <strong class="small">College</strong>
                    <div class="text-muted" style="font-size:.75rem">Mark attendance</div>
                  </div>
                </label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-person-plus me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center mt-3 mb-0 small">
          Already have an account? <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('input[name="role"]').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('.role-box').forEach(b => { b.style.borderColor=''; b.style.background=''; });
      r.nextElementSibling.style.borderColor = '#5661f6';
      r.nextElementSibling.style.background = '#f0f1ff';
    });
  });
</script>
</body>
</html>
