{% extends "base.html" %}
{% block title %}Reports – AttendanceAI{% endblock %}
{% block page_title %}Send Attendance Report{% endblock %}
{% block content %}

<div class="card">
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('admin_send_report') }}">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Report Type</label>
          <select name="report_type" class="form-select" required>
            <option value="daily" selected>Daily Report</option>
            <option value="weekly">Weekly Summary</option>
            <option value="monthly">Monthly Summary</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Date</label>
          <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Class</label>
          <select name="class_id" id="reportClassSelect" class="form-select" required>
            <option value="">Select Class</option>
            {% for c in classes %}
            <option value="{{ c[0] }}">{{ c[1] }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Section</label>
          <select name="section_id" id="reportSectionSelect" class="form-select" required>
            <option value="">Select Section</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Recipients (comma-separated emails)</label>
          <textarea name="recipients" class="form-control" rows="3" placeholder="email1@example.com, email2@example.com" required></textarea>
          <div class="form-text">Enter parent or staff email addresses separated by commas.</div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary mt-4">
        <i class="bi bi-send me-2"></i>Send Report
      </button>
    </form>
  </div>
</div>

<script>
document.getElementById('reportClassSelect').addEventListener('change', function() {
  const classId = this.value;
  const secSel = document.getElementById('reportSectionSelect');
  secSel.innerHTML = '<option value="">Select Section</option>';
  if (!classId) return;
  fetch('/api/sections/' + classId)
    .then(r => r.json())
    .then(data => {
      data.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        secSel.appendChild(opt);
      });
    });
});
</script>

{% endblock %}
