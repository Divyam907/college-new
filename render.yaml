# yaml-language-server: $schema=
databases:
  - name: autoattendance-db
    plan: free
    databaseName: autoattendance
    user: autoattendance_user

services:
  # ── Backend Flask API ────────────────────────────────────────────────────────
  - type: web
    name: college-attendance-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --preload
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoattendance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER
        value: "true"
      - key: FRONTEND_URL
        value: https://college-attendance-ui.onrender.com
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

  # ── Frontend React (Static Site) ─────────────────────────────────────────────
  - type: web
    name: college-attendance-ui
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://college-attendance-api.onrender.com
